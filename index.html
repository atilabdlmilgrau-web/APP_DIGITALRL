<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Digital RL Business - Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Digital RL Business - Solução de negócio digital segura">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 40px 24px 30px 24px;
            background: #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: #fff;
        }
        .safe-seal {
            background: #222;
            color: #1e90ff;
            font-size: 0.95em;
            font-weight: 500;
            margin-bottom: 28px;
            padding: 10px 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .safe-seal img {
            width: 20px;
            height: 20px;
        }
        .pricing-box {
            background: rgba(30, 144, 255, 0.1);
            border: 2px solid #1e90ff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .pricing-label {
            color: #1e90ff;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .pricing-value {
            font-size: 3em;
            font-weight: 700;
            color: #1e90ff;
            margin-bottom: 8px;
        }
        .pricing-description {
            color: #aaa;
            font-size: 0.95em;
        }
        .checkout-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #1e90ff, #0066cc);
            color: #fff;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            padding: 16px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 16px rgba(30, 144, 255, 0.3);
            margin-bottom: 16px;
        }
        .checkout-btn:hover {
            background: linear-gradient(135deg, #0066cc, #004999);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(30, 144, 255, 0.5);
        }
        .checkout-btn:active {
            transform: translateY(0);
        }
        .footer-text {
            color: #666;
            font-size: 0.8em;
            line-height: 1.6;
        }
        .footer-text a {
            color: #1e90ff;
            text-decoration: none;
            transition: color 0.3s;
        }
        .footer-text a:hover {
            color: #0066cc;
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px 25px 20px;
                border-radius: 12px;
            }
            .logo {
                font-size: 1.8em;
                margin-bottom: 8px;
            }
            .safe-seal {
                font-size: 0.85em;
                padding: 8px 0;
                margin-bottom: 24px;
            }
            .pricing-box {
                padding: 20px;
                margin-bottom: 28px;
            }
            .pricing-value {
                font-size: 2.5em;
            }
            .checkout-btn {
                font-size: 1.1em;
                padding: 14px 0;
                margin-bottom: 14px;
            }
            .footer-text {
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Digital RL Business</div>
        
        <div class="safe-seal">
            <img src="https://img.icons8.com/color/48/000000/lock--v2.png" alt="Segurança">
            Ambiente Seguro | Mercado Pago
        </div>

        <div class="pricing-box">
            <div class="pricing-label">Investimento Total</div>
            <div class="pricing-value">R$ 600</div>
            <div class="pricing-description">Acesso completo à plataforma</div>
        </div>

        <a class="checkout-btn" href="https://mpago.la/2kSGJeJ" target="_blank" rel="noopener noreferrer">
            Concluir Pagamento
        </a>

        <div class="footer-text">
            Pagamento seguro via Mercado Pago<br>
            <a href="#">Termos de Serviço</a> | <a href="#">Política de Privacidade</a>
        </div>
    </div>
</body>
</html>
